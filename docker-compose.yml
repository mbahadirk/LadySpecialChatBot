version: '3.8'

services:
  app:
    build: .
    container_name: ladyspecial_bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - qdrant
    networks:
      - ladyspecial_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ladyspecial_network

networks:
  ladyspecial_network:
    driver: bridge

volumes:
  qdrant_data:
